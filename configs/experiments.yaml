defaults:
  data_root: STL10
  split_file: splits/stl10_seed42_valid20.json
  output_dir: runs
  seed: 42
  device: auto
  image_size: 96
  batch_size: 128
  num_workers: 4
  epochs: 35
  model:
    name: basic_cnn
  optimizer:
    name: sgd
    lr: 0.01
    weight_decay: 0.0005
  loss:
    name: cross_entropy
  transform:
    name: basic

experiments:
  # Raw control: kept intentionally weak to show the effect of optimizer/model tuning.
  baseline_sgd_ce:
    description: Basic CNN, no augmentation, custom SGD, custom cross entropy.

  optimizer_adam:
    description: Only replace SGD with custom Adam.
    optimizer:
      name: adam
      lr: 0.001
      betas: [0.9, 0.999]
      eps: 1.0e-8
      weight_decay: 0.0005

  loss_label_smooth:
    description: Only replace cross entropy with label smoothing cross entropy.
    loss:
      name: label_smoothing_cross_entropy
      smoothing: 0.1

  data_aug:
    description: Only add data augmentation.
    transform:
      name: train_aug

  bn_dropout:
    description: Replace BasicCNN with BatchNorm and Dropout variant.
    model:
      name: regularized_cnn
      dropout: 0.3

  # Strong supervised baseline from the remote tuning sweep.
  # Validation evidence: 67.71% best valid accuracy at 35 epochs on the fixed split.
  baseline_strong:
    description: Strong supervised baseline with light regularization, Adam, and augmentation.
    model:
      name: regularized_cnn
      dropout: 0.1
    optimizer:
      name: adam
      lr: 0.001
      betas: [0.9, 0.999]
      eps: 1.0e-8
      weight_decay: 0.0001
    loss:
      name: label_smoothing_cross_entropy
      smoothing: 0.05
    transform:
      name: train_aug

  # Medium-capacity tuning target. Use this when faster iteration matters.
  # Validation/test evidence: 75.14% valid, 74.00% test with cosine LR.
  vgg_medium_tuned:
    description: VGG-style CNN with moderate capacity and cosine learning-rate decay.
    model:
      name: vgg_cnn
      channels: [64, 128, 256]
      blocks: [2, 2, 2]
      dropout: 0.05
    optimizer:
      name: adam
      lr: 0.001
      betas: [0.9, 0.999]
      eps: 1.0e-8
      weight_decay: 0.0001
    scheduler:
      name: cosine
      min_lr: 1.0e-5
    loss:
      name: label_smoothing_cross_entropy
      smoothing: 0.05
    transform:
      name: train_aug

  # Final tuned supervised configuration. This was selected after comparing
  # model capacity, dropout, label smoothing, optimizer, batch size, and LR decay.
  # Validation/test evidence: 79.50% valid, 79.80% test at 35 epochs.
  combined_best:
    description: Best supervised CNN found by remote tuning sweep.
    model:
      name: vgg_cnn
      channels: [64, 128, 256, 512]
      blocks: [2, 2, 2, 2]
      dropout: 0.05
    optimizer:
      name: adam
      lr: 0.001
      betas: [0.9, 0.999]
      eps: 1.0e-8
      weight_decay: 0.0001
    scheduler:
      name: cosine
      min_lr: 1.0e-5
    loss:
      name: label_smoothing_cross_entropy
      smoothing: 0.05
    transform:
      name: train_aug
